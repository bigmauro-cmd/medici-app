<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ricerca Medici</title>
<style>
  :root{
    --blu:#1a3a5c;--az:#2196F3;--az2:#1565C0;--gr:#43a047;--ro:#e53935;
    --bg:#f0f4f8;--card:#fff;--brd:#cfd8dc;--txt:#1a1a2e;--sub:#546e7a;
    --rad:12px;--shad:0 4px 18px rgba(0,0,0,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}

  /* ---- HEADER ---- */
  header{
    background:linear-gradient(135deg,var(--blu),var(--az2));
    color:#fff;display:flex;align-items:center;gap:14px;
    padding:10px 18px;box-shadow:0 3px 12px rgba(0,0,0,.25);
    position:sticky;top:0;z-index:100;
  }
  header img{height:48px;width:auto;border-radius:6px;}
  header h1{font-size:1.15rem;font-weight:700;letter-spacing:.3px;flex:1;}
  .hdr-btns{display:flex;gap:8px;align-items:center;}

  /* ---- PAGINE ---- */
  .page{display:none;padding:20px 14px;max-width:980px;margin:0 auto;}
  .page.active{display:block;}

  /* ---- CARD ---- */
  .card{background:var(--card);border-radius:var(--rad);box-shadow:var(--shad);padding:28px 24px;margin-bottom:18px;}

  /* ---- LOGIN ---- */
  #pg-login{max-width:420px;}
  #pg-login h2{text-align:center;color:var(--blu);margin-bottom:22px;font-size:1.3rem;}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--sub);margin-bottom:5px;}
  .form-group input{width:100%;padding:11px 14px;border:1.5px solid var(--brd);border-radius:8px;font-size:1rem;transition:border .2s;}
  .form-group input:focus{outline:none;border-color:var(--az);}
  .btn{padding:11px 22px;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;transition:background .2s,transform .1s;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--az);color:#fff;}
  .btn-primary:hover{background:var(--az2);}
  .btn-secondary{background:#eceff1;color:var(--blu);}
  .btn-secondary:hover{background:#cfd8dc;}
  .btn-danger{background:var(--ro);color:#fff;}
  .btn-danger:hover{background:#c62828;}
  .btn-success{background:var(--gr);color:#fff;}
  .btn-success:hover{background:#388e3c;}
  .btn-bio{background:#7b1fa2;color:#fff;display:flex;align-items:center;gap:8px;}
  .btn-bio:hover{background:#6a1b9a;}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px;}
  .err-msg{color:var(--ro);font-size:.88rem;margin-top:8px;display:none;}
  .err-msg.on{display:block;}
  #bio-note{font-size:.8rem;color:var(--sub);margin-top:10px;display:none;}
  #bio-note.on{display:block;}

  /* ---- RICERCA ---- */
  #pg-search h2{color:var(--blu);margin-bottom:18px;font-size:1.1rem;}
  .dd-wrap{position:relative;margin-bottom:14px;}
  .dd-wrap label{display:block;font-size:.83rem;font-weight:600;color:var(--sub);margin-bottom:4px;}
  .dd-input-wrap{position:relative;}
  .dd-input{width:100%;padding:10px 36px 10px 12px;border:1.5px solid var(--brd);border-radius:8px;font-size:.95rem;cursor:pointer;background:#fff;}
  .dd-input:focus{outline:none;border-color:var(--az);}
  .dd-input.err-i{border-color:var(--ro)!important;}
  .dd-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--sub);}
  .dd-list{
    position:absolute;top:100%;left:0;right:0;z-index:50;
    background:#fff;border:1.5px solid var(--az);border-radius:8px;
    max-height:220px;overflow-y:auto;box-shadow:0 6px 20px rgba(0,0,0,.12);
    display:none;
  }
  .dd-list.open{display:block;}
  .dd-item{padding:9px 14px;cursor:pointer;font-size:.92rem;}
  .dd-item:hover,.dd-item.sel{background:#e3f2fd;}
  .dd-clr{position:absolute;right:28px;top:50%;transform:translateY(-50%);cursor:pointer;color:#aaa;font-size:1rem;display:none;}
  .dd-clr.on{display:block;}
  .dd-err{color:var(--ro);font-size:.8rem;margin-top:3px;display:none;}
  .dd-err.on{display:block;}

  /* ---- RISULTATI ---- */
  #pg-results .res-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  #pg-results h2{color:var(--blu);font-size:1.05rem;}
  .res-count{font-size:.85rem;color:var(--sub);}

  /* Tabella STANDARD (orizzontale) */
  .tbl-wrap{overflow-x:auto;}
  table.res-tbl{width:100%;border-collapse:collapse;font-size:.88rem;}
  table.res-tbl th{
    background:var(--blu);color:#fff;padding:10px 12px;text-align:left;
    white-space:nowrap;position:sticky;top:0;
  }
  table.res-tbl td{
    padding:9px 12px;border-bottom:1px solid #eceff1;
    font-weight:700; /* MODIFICA 1: grassetto nelle celle risultato */
  }
  table.res-tbl tr:nth-child(even) td{background:#f5f9ff;}
  table.res-tbl tr:hover td{background:#e3f2fd;}
  table.res-tbl tr.sel-row td{background:#fff9c4;}

  /* Tabella VERTICALE (card per riga) */
  .vert-list{display:none;}
  .vert-list.on{display:block;}
  .vert-card{
    background:#fff;border:1.5px solid var(--brd);border-radius:10px;
    margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);
  }
  .vert-card:hover{border-color:var(--az);}
  .vert-card.sel-row{border-color:#f9a825;background:#fffde7;}
  .vert-row{display:flex;border-bottom:1px solid #eceff1;}
  .vert-row:last-child{border-bottom:none;}
  .vert-lbl{
    background:#e8edf2;color:var(--blu);font-size:.78rem;font-weight:700;
    padding:8px 10px;min-width:110px;max-width:130px;word-break:break-word;
  }
  .vert-val{
    padding:8px 12px;font-size:.9rem;font-weight:700; /* MODIFICA 1: grassetto */
    flex:1;word-break:break-word;
  }

  /* Pulsante vista */
  .btn-vista{background:#fff;color:var(--blu);border:1.5px solid var(--blu);font-size:.8rem;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600;white-space:nowrap;}
  .btn-vista:hover{background:var(--blu);color:#fff;}

  /* ---- DETTAGLIO ---- */
  #pg-detail .det-back{margin-bottom:14px;}
  #pg-detail h2{color:var(--blu);margin-bottom:18px;font-size:1.1rem;}
  .det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;}
  @media(max-width:520px){.det-grid{grid-template-columns:1fr;}}
  .det-item label{font-size:.78rem;font-weight:700;color:var(--sub);display:block;margin-bottom:2px;}
  .det-item span{font-size:.97rem;font-weight:700;color:var(--txt);}
  .tel-link{color:var(--az);text-decoration:none;font-weight:700;}
  .tel-link:hover{text-decoration:underline;}

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#f0f4f8;}
  ::-webkit-scrollbar-thumb{background:#b0bec5;border-radius:3px;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <img id="hdr-logo" src="https://drive.google.com/thumbnail?id=1lpWkMmRPpTdGx-wocFCHp2VlDKw3yJqb&sz=w120" alt="Logo" onerror="this.style.display='none'"/>
  <h1>Ricerca Medici</h1>
  <div class="hdr-btns" id="hdr-btns" style="display:none;">
    <button class="btn btn-danger" onclick="doLogout()">⏻ Esci</button>
  </div>
</header>

<!-- LOGIN -->
<div class="page active" id="pg-login">
  <div class="card">
    <h2>🔐 Accesso</h2>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="psw-in" placeholder="Inserisci password..." onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="err-msg" id="err-login">Non autorizzato, contattare l'amministratore</div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="doLogin()">Accedi</button>
    </div>
    <div id="bio-note" class="on">
      <br/>
      <button class="btn btn-bio" id="btn-bio" onclick="doBiometric()">
        <span id="bio-icon">👆</span> <span id="bio-label">Accedi con Biometria</span>
      </button>
      <div id="bio-status" style="font-size:.8rem;color:var(--sub);margin-top:6px;"></div>
    </div>
  </div>
</div>

<!-- RICERCA -->
<div class="page" id="pg-search">
  <div class="card">
    <h2>🔎 Ricerca</h2>
    <!-- Spec1 -->
    <div class="dd-wrap" id="w-s1">
      <label>Specializzazione principale</label>
      <div class="dd-input-wrap">
        <input class="dd-input" id="i-s1" placeholder="Cerca o seleziona..." autocomplete="off"
          onfocus="ddOpen('s1')" oninput="ddInp('s1')" onkeydown="ddKey(event,'s1')"/>
        <span class="dd-arrow">▼</span>
        <span class="dd-clr" id="clr-s1" onclick="ddClr('s1')">✕</span>
      </div>
      <div class="dd-list" id="dl-s1"></div>
      <div class="dd-err" id="er-s1">Nessuna corrispondenza trovata</div>
    </div>
    <!-- Rep -->
    <div class="dd-wrap" id="w-rp">
      <label>Reparto ospedaliero</label>
      <div class="dd-input-wrap">
        <input class="dd-input" id="i-rp" placeholder="Cerca o seleziona..." autocomplete="off"
          onfocus="ddOpen('rp')" oninput="ddInp('rp')" onkeydown="ddKey(event,'rp')"/>
        <span class="dd-arrow">▼</span>
        <span class="dd-clr" id="clr-rp" onclick="ddClr('rp')">✕</span>
      </div>
      <div class="dd-list" id="dl-rp"></div>
      <div class="dd-err" id="er-rp">Nessuna corrispondenza trovata</div>
    </div>
    <!-- Spec2 -->
    <div class="dd-wrap" id="w-s2">
      <label>Specializzazione</label>
      <div class="dd-input-wrap">
        <input class="dd-input" id="i-s2" placeholder="Cerca o seleziona..." autocomplete="off"
          onfocus="ddOpen('s2')" oninput="ddInp('s2')" onkeydown="ddKey(event,'s2')"/>
        <span class="dd-arrow">▼</span>
        <span class="dd-clr" id="clr-s2" onclick="ddClr('s2')">✕</span>
      </div>
      <div class="dd-list" id="dl-s2"></div>
      <div class="dd-err" id="er-s2">Nessuna corrispondenza trovata</div>
    </div>
    <!-- Città -->
    <div class="dd-wrap" id="w-ct">
      <label>Città</label>
      <div class="dd-input-wrap">
        <input class="dd-input" id="i-ct" placeholder="Cerca o seleziona..." autocomplete="off"
          onfocus="ddOpen('ct')" oninput="ddInp('ct')" onkeydown="ddKey(event,'ct')"/>
        <span class="dd-arrow">▼</span>
        <span class="dd-clr" id="clr-ct" onclick="ddClr('ct')">✕</span>
      </div>
      <div class="dd-list" id="dl-ct"></div>
      <div class="dd-err" id="er-ct">Nessuna corrispondenza trovata</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="doSearch()">🔍 Cerca</button>
      <button class="btn btn-secondary" onclick="clearAll()">↺ Azzera</button>
    </div>
  </div>
</div>

<!-- RISULTATI -->
<div class="page" id="pg-results">
  <div class="card">
    <div class="res-header">
      <div>
        <h2>📋 Risultati della ricerca</h2>
        <div class="res-count" id="res-count"></div>
      </div>
      <!-- MODIFICA 2: Pulsante vista verticale/standard -->
      <button class="btn-vista" id="btn-vista" onclick="toggleVista()">Vista Verticale</button>
    </div>
    <!-- Vista standard -->
    <div class="tbl-wrap" id="tbl-standard">
      <table class="res-tbl">
        <thead id="res-thead"></thead>
        <tbody id="res-tbody"></tbody>
      </table>
    </div>
    <!-- Vista verticale -->
    <div class="vert-list" id="tbl-vertical"></div>

    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-secondary" onclick="goTo('search')">◀ Nuova ricerca</button>
    </div>
  </div>
</div>

<!-- DETTAGLIO -->
<div class="page" id="pg-detail">
  <div class="card">
    <div class="det-back">
      <button class="btn btn-secondary" onclick="goTo('results')">◀ Torna ai risultati</button>
    </div>
    <h2>👤 Dettaglio medico</h2>
    <div class="det-grid" id="det-grid"></div>
  </div>
</div>

<script>
// ============================================================
//  CONFIGURAZIONE
// ============================================================
const PASSWORDS  = ['admin123','medici2024']; // <-- modificare
const SHEET_ID   = '1nfNzozWh5_PkB8Nj7-kNLdWig6aN3Z_m';
const SHEET_NAME = 'Elenco x APP';
const API_KEY    = 'AIzaSyD2B7REXq8GX6K9q5Zf7yKbI7pRqWkL3Xo'; // sostituire con la chiave reale

// Biometric credential storage key
const BIO_CRED_KEY = 'medici_bio_cred';

// ============================================================
//  STATO
// ============================================================
let sheetData=[], results=[], lastS1='', selRow=null;
let vistaVerticale = false; // MODIFICA 2

// ============================================================
//  UTILITY
// ============================================================
const el = id => document.getElementById(id);
const norm = s => (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

// ============================================================
//  NAVIGAZIONE
// ============================================================
function goTo(pg){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el('pg-'+pg).classList.add('active');
  window.scrollTo(0,0);
  if(pg==='search') el('hdr-btns').style.display='flex';
}

// ============================================================
//  DATI
// ============================================================
async function loadSheet(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const r=await fetch(url);
    const txt=await r.text();
    const json=JSON.parse(txt.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
    const cols=json.table.cols.map(c=>c.label||'');
    sheetData=json.table.rows.map(row=>{
      const obj={};
      cols.forEach((c,i)=>{ obj[c]=(row.c[i]&&row.c[i].v!=null)?String(row.c[i].v):''; });
      // Alias colonne A B C D
      const cc=Object.keys(obj);
      obj['A']=obj[cc[0]]||''; obj['B']=obj[cc[1]]||'';
      obj['C']=obj[cc[2]]||''; obj['D']=obj[cc[3]]||'';
      return obj;
    });
  }catch(e){
    console.warn('Impossibile caricare il foglio:',e);
    sheetData=[];
  }
  ddInit();
}

// ============================================================
//  DROP-DOWN
// ============================================================
const DD={
  s1:{col:'A',dep:['rp','s2','ct']},
  rp:{col:'B',dep:[]},
  s2:{col:'C',dep:[]},
  ct:{col:'D',dep:[]}
};

function ddUniq(col,filter){
  let rows=sheetData;
  if(filter){
    const s1v=norm(el('i-s1').value);
    if(s1v) rows=rows.filter(r=>norm(r['A']).includes(s1v));
  }
  return [...new Set(rows.map(r=>r[col]).filter(Boolean))].sort((a,b)=>norm(a).localeCompare(norm(b)));
}

function ddInit(){
  Object.keys(DD).forEach(k=>{
    const items=ddUniq(DD[k].col, k!=='s1');
    ddRend(k,items,'');
  });
}

function ddRend(k,items,q){
  const dl=el('dl-'+k); dl.innerHTML='';
  const f=items.filter(i=>norm(i).includes(norm(q)));
  f.forEach(item=>{
    const d=document.createElement('div');
    d.className='dd-item'; d.textContent=item;
    d.onclick=()=>ddPick(k,item);
    dl.appendChild(d);
  });
}

function ddOpen(k){
  Object.keys(DD).forEach(x=>{ if(x!==k) el('dl-'+x).classList.remove('open'); });
  const dl=el('dl-'+k);
  ddRend(k, ddUniq(DD[k].col, k!=='s1'), el('i-'+k).value);
  dl.classList.add('open');
}

function ddClose(k){ el('dl-'+k).classList.remove('open'); }

function ddTog(k){
  if(el('dl-'+k).classList.contains('open')) ddClose(k); else ddOpen(k);
}

function ddInp(k){
  el('er-'+k).classList.remove('on');
  el('i-'+k).classList.remove('err-i');
  const q=el('i-'+k).value;
  el('clr-'+k).classList.toggle('on',q.length>0);
  ddRend(k, ddUniq(DD[k].col, k!=='s1'), q);
  el('dl-'+k).classList.add('open');
  if(k==='s1'){
    DD.s1.dep.forEach(dep=>{
      const cur=el('i-'+dep).value;
      if(cur){
        const newItems=ddUniq(DD[dep].col,true);
        if(!newItems.includes(cur)) ddClr(dep);
      }
    });
  }
}

function ddPick(k,val){
  el('i-'+k).value=val;
  el('clr-'+k).classList.add('on');
  ddClose(k);
  el('er-'+k).classList.remove('on');
  el('i-'+k).classList.remove('err-i');
  if(k==='s1'){
    DD.s1.dep.forEach(dep=>{
      const cur=el('i-'+dep).value;
      if(cur){
        const newItems=ddUniq(DD[dep].col,true);
        if(!newItems.includes(cur)) ddClr(dep);
      }
    });
  }
}

function ddClr(k){
  el('i-'+k).value=''; el('clr-'+k).classList.remove('on');
  el('er-'+k).classList.remove('on'); el('i-'+k).classList.remove('err-i');
  ddClose(k);
  if(k==='s1') DD.s1.dep.forEach(dep=>ddClr(dep));
}

function ddKey(e,k){
  const dl=el('dl-'+k);
  const items=dl.querySelectorAll('.dd-item');
  const cur=[...items].findIndex(i=>i.classList.contains('sel'));
  if(e.key==='ArrowDown'){e.preventDefault();const nx=(cur+1)%items.length;items.forEach(i=>i.classList.remove('sel'));if(items[nx]){items[nx].classList.add('sel');items[nx].scrollIntoView({block:'nearest'});}}
  else if(e.key==='ArrowUp'){e.preventDefault();const nx=(cur-1+items.length)%items.length;items.forEach(i=>i.classList.remove('sel'));if(items[nx]){items[nx].classList.add('sel');items[nx].scrollIntoView({block:'nearest'});}}
  else if(e.key==='Enter'){e.preventDefault();const s=[...items].find(i=>i.classList.contains('sel'));if(s)ddPick(k,s.textContent);else ddClose(k);}
  else if(e.key==='Escape'){ddClose(k);}
}

document.addEventListener('click',e=>{
  Object.keys(DD).forEach(k=>{
    const wrap=el('w-'+k);
    if(wrap&&!wrap.contains(e.target)) ddClose(k);
  });
});

function clearAll(){
  Object.keys(DD).forEach(k=>ddClr(k));
}

// ============================================================
//  RICERCA
// ============================================================
let lastSearchHadErrors=false;

function doSearch(){
  const s1=el('i-s1').value.trim(), rp=el('i-rp').value.trim();
  const s2=el('i-s2').value.trim(), ct=el('i-ct').value.trim();

  // Reset errori
  ['s1','rp','s2','ct'].forEach(k=>{
    el('er-'+k).classList.remove('on');
    el('i-'+k).classList.remove('err-i');
  });

  let f=[...sheetData];
  let hadErr=false;

  function flt(col,iid,eid,q){
    if(!q) return;
    const r=f.filter(x=>norm(x[col]).includes(norm(q)));
    if(!r.length){
      el(eid).classList.add('on'); el(iid).classList.add('err-i');
      hadErr=true;
      if(lastSearchHadErrors){ el(iid).value=''; el('clr-'+iid.replace('i-','')).classList.remove('on'); }
    } else { f=r; }
  }

  flt('A','i-s1','er-s1',s1); flt('B','i-rp','er-rp',rp);
  flt('C','i-s2','er-s2',s2); flt('D','i-ct','er-ct',ct);

  lastSearchHadErrors=hadErr;
  results=f; lastS1=s1; selRow=null;
  renderRes();
  goTo('results');
}

// ============================================================
//  RENDER RISULTATI
// ============================================================
function renderRes(){
  el('res-count').textContent=`${results.length} risultat${results.length===1?'o':'i'} trovati`;
  if(!results.length){ el('res-thead').innerHTML=''; el('res-tbody').innerHTML='<tr><td colspan="99" style="text-align:center;padding:20px;color:#999">Nessun risultato</td></tr>'; el('tbl-vertical').innerHTML=''; return; }

  const cols=Object.keys(results[0]).filter(k=>!['A','B','C','D'].includes(k));

  // ---- TABELLA STANDARD ----
  el('res-thead').innerHTML='<tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr>';
  el('res-tbody').innerHTML=results.map((row,i)=>`<tr class="${i===selRow?'sel-row':''}" onclick="selectRow(${i})">${cols.map(c=>`<td>${row[c]||''}</td>`).join('')}</tr>`).join('');

  // ---- VISTA VERTICALE ----
  el('tbl-vertical').innerHTML=results.map((row,i)=>`
    <div class="vert-card ${i===selRow?'sel-row':''}" onclick="selectRow(${i})">
      ${cols.map(c=>`<div class="vert-row"><div class="vert-lbl">${c}</div><div class="vert-val">${row[c]||''}</div></div>`).join('')}
    </div>`).join('');
}

function selectRow(i){
  selRow=i;
  renderRes();
  showDetail(results[i]);
}

function showDetail(row){
  const cols=Object.keys(row).filter(k=>!['A','B','C','D'].includes(k));
  el('det-grid').innerHTML=cols.map(c=>{
    let val=row[c]||'–';
    const isTel=/tel|phone|num/i.test(c);
    if(isTel&&val!=='–') val=`<a class="tel-link" href="tel:${val}">${val}</a>`;
    return `<div class="det-item"><label>${c}</label><span>${val}</span></div>`;
  }).join('');
  goTo('detail');
}

function doLogin(){
  const psw=el('psw-in').value;
  if(PASSWORDS.includes(psw)){
    el('err-login').classList.remove('on');
    el('psw-in').value='';
    el('hdr-btns').style.display='flex';
    if(!sheetData.length) loadSheet().then(()=>goTo('search')); else goTo('search');

    el('err-login').classList.add('on');
  }
}

function doLogout(){
  goTo('login');
  el('hdr-btns').style.display='none';
  el('psw-in').value='';
  clearAll();
  results=[]; sheetData=[];
}

// ============================================================
//  MODIFICA 3 — BIOMETRIA (WebAuthn)
// ============================================================
async function bioAvailable(){
  return window.PublicKeyCredential &&
    await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
}

function bufToB64(buf){
  return btoa(String.fromCharCode(...new Uint8Array(buf)));
}
function b64ToBuf(b64){
  const bin=atob(b64);
  const buf=new Uint8Array(bin.length);
  bin.split('').forEach((c,i)=>buf[i]=c.charCodeAt(0));
  return buf.buffer;
}

async function doBiometric(){
  const st=el('bio-status');
  const available=await bioAvailable();
  if(!available){
    st.textContent='⚠️ Biometria non supportata su questo dispositivo/browser.';
    return;
  }
  const credRaw=localStorage.getItem(BIO_CRED_KEY);
  if(!credRaw){
    // Prima volta: registra
    st.textContent='⏳ Registrazione impronta/volto in corso...';
    try{
      const cred=await navigator.credentials.create({publicKey:{
        challenge:crypto.getRandomValues(new Uint8Array(32)),
        rp:{name:'Ricerca Medici'},
        user:{id:new TextEncoder().encode('medici-user'),name:'utente',displayName:'Utente Medici'},
        pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
        timeout:60000
      }});
      localStorage.setItem(BIO_CRED_KEY, JSON.stringify({
        id: bufToB64(cred.rawId),
        type: cred.type
      }));
      st.textContent='✅ Biometria registrata! Ripremi per accedere.';
    }catch(e){
      st.textContent='❌ Registrazione annullata: '+e.message;
    }
    return;
  }
  // Già registrata: verifica
  st.textContent='⏳ Verifica biometria...';
  try{
    const stored=JSON.parse(credRaw);
    const assertion=await navigator.credentials.get({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:[{type:'public-key',id:b64ToBuf(stored.id)}],
      userVerification:'required',
      timeout:60000
    }});
    if(assertion){
      st.textContent='✅ Accesso biometrico riuscito!';
      el('err-login').classList.remove('on');
      el('hdr-btns').style.display='flex';
      if(!sheetData.length) loadSheet().then(()=>goTo('search')); else goTo('search');
    }
  }catch(e){
    st.textContent='❌ Verifica fallita: '+e.message;
  }
}

// Controlla disponibilità biometria all'avvio
(async()=>{
  const avail=await bioAvailable().catch(()=>false);
  const note=el('bio-note');
  const stored=localStorage.getItem(BIO_CRED_KEY);
  if(avail){
    note.classList.add('on');
    el('bio-icon').textContent = /iPhone|iPad|Mac/i.test(navigator.userAgent) ? '🍎' : '👆';
    el('bio-label').textContent = stored ? 'Accedi con Biometria' : 'Registra Biometria';
  } else {
    note.classList.remove('on');
  }
})();
</script>
